<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>нейрон</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --surface: #0f0f0f;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --text: #e0e0e0;
    --muted: #444;
    --muted2: #666;
    --accent: #e0e0e0;
    --green: #a8d8a8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .logo { font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -0.3px; }
  .model-tag { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* API panel */
  #apiPanel {
    margin: 20px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    flex-shrink: 0;
  }

  #apiPanel.hidden { display: none; }

  .api-label {
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .api-row { display: flex; gap: 8px; }

  #apiKey {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  #apiKey:focus { border-color: var(--border2); }
  #apiKey::placeholder { color: var(--muted); }

  .btn-connect {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-connect:hover { opacity: 0.85; }

  .api-hint {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  .api-hint a { color: var(--muted2); }

  /* Connected bar */
  #connectedBar {
    margin: 12px 28px 0;
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #connectedBar.show { display: flex; }

  .conn-status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--muted2);
  }

  .dot-green {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
  }

  .btn-reset {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.15s;
  }

  .btn-reset:hover { color: var(--text); }

  /* Chat */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 28px;
    animation: fadeUp 0.4s ease;
  }

  .welcome-title {
    font-size: 24px;
    font-weight: 300;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .welcome-title span { color: var(--muted2); }

  .suggestions { display: flex; flex-direction: column; gap: 8px; max-width: 400px; }

  .chip {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, color 0.15s;
  }

  .chip:hover { border-color: var(--border2); color: var(--muted2); }

  /* Messages */
  .msg { animation: fadeUp 0.25s ease; }

  .msg-user {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 4px;
  }

  .bubble-user {
    max-width: 72%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .msg-ai {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 4px;
  }

  .bubble-ai {
    max-width: 80%;
    font-size: 14px;
    line-height: 1.75;
    color: #c8c8c8;
    padding: 4px 0;
  }

  .bubble-ai pre {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--green);
    font-family: 'DM Mono', monospace;
  }

  .bubble-ai code {
    font-family: 'DM Mono', monospace;
    background: #141414;
    padding: 1px 5px;
    border-radius: 5px;
    font-size: 12.5px;
    color: var(--green);
  }

  .bubble-ai pre code { background: none; padding: 0; }
  .bubble-ai strong { color: #e0e0e0; font-weight: 500; }

  /* Typing */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 8px 0;
  }

  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.1s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input */
  #inputArea {
    padding: 14px 28px 24px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: var(--border2); }

  #msgInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    max-height: 140px;
    min-height: 24px;
    padding: 4px 0;
    scrollbar-width: none;
  }

  #msgInput::placeholder { color: var(--muted); }
  #msgInput::-webkit-scrollbar { display: none; }

  #sendBtn {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: var(--border2);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  #sendBtn.active { background: var(--text); }
  #sendBtn.active:hover { background: #ccc; }
  #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint { text-align: center; margin-top: 10px; font-size: 11px; color: #1e1e1e; }

  /* Error */
  .error {
    background: rgba(255,80,80,0.06);
    border: 1px solid rgba(255,80,80,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #ff9090;
    margin: 4px 0;
  }

  @media (max-width: 500px) {
    header, #apiPanel, #connectedBar, #chat, #inputArea { padding-left: 16px; padding-right: 16px; }
    #apiPanel { margin-left: 16px; margin-right: 16px; }
    #connectedBar { margin-left: 16px; margin-right: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">нейрон</div>
  <div class="model-tag">claude sonnet</div>
</header>

<div id="apiPanel">
  <div class="api-label">// API ключ Anthropic</div>
  <div class="api-row">
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="btn-connect" onclick="connect()">Войти</button>
  </div>
  <div class="api-hint">
    Ключ хранится только в браузере. Получить бесплатно на
    <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </div>
</div>

<div id="connectedBar">
  <div class="conn-status">
    <div class="dot-green"></div>
    подключено
  </div>
  <button class="btn-reset" onclick="reset()">сменить ключ</button>
</div>

<div id="chat">
  <div id="welcome">
    <div class="welcome-title">Чем могу помочь?<br><span>Задай любой вопрос</span></div>
    <div class="suggestions">
      <button class="chip" onclick="quick('Объясни квантовые компьютеры простыми словами')">Объясни квантовые компьютеры просто</button>
      <button class="chip" onclick="quick('Напиши сортировку пузырьком на Python')">Напиши сортировку на Python</button>
      <button class="chip" onclick="quick('Придумай название для IT-стартапа')">Придумай название для стартапа</button>
      <button class="chip" onclick="quick('Как работает нейронная сеть?')">Как работает нейронная сеть?</button>
    </div>
  </div>
</div>

<div id="inputArea">
  <div class="input-wrap">
    <textarea id="msgInput" rows="1" placeholder="Напишите сообщение..."
      oninput="resize(this); toggleBtn()"
      onkeydown="onKey(event)"></textarea>
    <button id="sendBtn" onclick="send()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="#080808" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="hint">Enter — отправить · Shift+Enter — новая строка</div>
</div>

<script>
  let key = '';
  let history = [];
  let busy = false;

  // Load saved key
  const saved = localStorage.getItem('nkey');
  if (saved) { key = saved; showConnected(); }

  function connect() {
    const val = document.getElementById('apiKey').value.trim();
    if (!val) return;
    key = val;
    localStorage.setItem('nkey', val);
    showConnected();
  }

  function reset() {
    key = '';
    localStorage.removeItem('nkey');
    document.getElementById('apiKey').value = '';
    document.getElementById('apiPanel').classList.remove('hidden');
    document.getElementById('connectedBar').classList.remove('show');
    document.getElementById('sendBtn').disabled = true;
  }

  function showConnected() {
    document.getElementById('apiPanel').classList.add('hidden');
    document.getElementById('connectedBar').classList.add('show');
    document.getElementById('sendBtn').disabled = false;
    toggleBtn();
  }

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function toggleBtn() {
    const btn = document.getElementById('sendBtn');
    const val = document.getElementById('msgInput').value.trim();
    if (val && key && !busy) {
      btn.disabled = false;
      btn.classList.add('active');
    } else {
      btn.disabled = true;
      btn.classList.remove('active');
    }
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function quick(text) {
    if (!key) return;
    document.getElementById('msgInput').value = text;
    send();
  }

  async function send() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !key || busy) return;

    // Remove welcome
    const w = document.getElementById('welcome');
    if (w) w.remove();

    history.push({ role: 'user', content: text });
    addMsg('user', text);

    input.value = '';
    input.style.height = 'auto';
    busy = true;
    toggleBtn();

    const typing = addTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'Ты умный и лаконичный ассистент. Отвечай на языке пользователя. Форматируй код в ```блоки```.',
          messages: history
        })
      });

      typing.remove();

      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error?.message || 'Ошибка ' + res.status);
      }

      const data = await res.json();
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMsg('ai', reply);

    } catch (err) {
      typing.remove();
      addError(err.message);
    }

    busy = false;
    toggleBtn();
  }

  function addMsg(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg';

    if (role === 'user') {
      div.innerHTML = `<div class="msg-user"><div class="bubble-user">${esc(text)}</div></div>`;
    } else {
      div.innerHTML = `<div class="msg-ai"><div class="bubble-ai">${fmt(text)}</div></div>`;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `<div class="msg-ai"><div class="bubble-ai"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addError(msg) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'error';
    div.textContent = '⚠ ' + msg;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function fmt(text) {
    // code blocks
    text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) =>
      `<pre><code>${esc(c.trim())}</code></pre>`);
    // inline code
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
    // bold
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // newlines
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
